experiment_id: EXP-05
title: Vol targeting with banded leverage
hypothesis: Vol targeting with leverage band 5x-12x raises gross Sharpe but costs reduce net Sharpe.
inputs:
  n_days: 2520
  true_sharpe: 1.5
  target_vol: 0.15
assumptions:
  - Gaussian daily returns with fixed true Sharpe
  - Leverage clipped to band per PDF review
cost_model:
  commission_bps: 1.0
  slippage_bps: 1.5
  market_impact_model: none
capacity_limit: implicit via leverage band
outputs:
  - gross_sharpe
  - net_sharpe
  - mean_leverage
limitations:
  - Not Kelly-optimal estimation error model
linked_signals:
  - SIG-015
