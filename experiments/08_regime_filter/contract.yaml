experiment_id: EXP-08
title: Regime-gated ensemble toy
hypothesis: Simple vol-regime gate changes blended mean-reversion sleeve net Sharpe versus always-on ensemble.
inputs:
  n_days: 1260
  seed: 11
assumptions:
  - Two mean-reversion seeds as sleeve proxies
  - Binary gate from rolling vol vs median
cost_model:
  commission_bps: 1.5
  slippage_bps: 2.5
  market_impact_model: none
capacity_limit: "Synthetic single-asset proxy"
outputs:
  - always_on_net_sharpe
  - regime_gated_net_sharpe
  - high_vol_fraction
limitations:
  - Not HMM estimation
  - No momentum sleeve full model
linked_signals:
  - SIG-005
  - SIG-002
