# External data paths for Phase VII experiments
manifest_version: 1

# CI uses synthetic toys only. Optional local datasets below are not required for make smoke.

datasets:
  - id: fred_macro
    description: "FRED macro series (public API) for economic_releases row"
    path: data/external/fred/
    matrix_rows: [economic_releases]
    license: public_domain
    status: optional

  - id: yfinance_equity_daily
    description: "Yahoo Finance daily OHLCV for optional local equity_daily_ohlcv experiments"
    path: data/external/yfinance/
    matrix_rows: [equity_daily_ohlcv]
    license: vendor_terms
    status: optional
