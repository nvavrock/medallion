project:
  type: website
  output-dir: _site

website:
  title: "Medallion Fund Reconstruction"
  site-url: https://nvavrock.github.io/medallion/
  repo-url: https://github.com/nvavrock/medallion
  repo-subdir: quarto
  repo-actions: [edit, issue]
  navbar:
    logo: images/rockstedy-logo.png
    logo-alt: Rocksteady Analytics
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/nvavrock/medallion
  sidebar:
    style: floating
    contents:
      - section: "Chapters"
        contents:
          - href: intro.qmd
            text: Introduction
          - href: chapters/01-history.qmd
            text: I — Historical Reconstruction
          - href: chapters/02-data.qmd
            text: II — Data Architecture
          - href: chapters/03-signals.qmd
            text: III — Signal Reconstruction
          - href: chapters/04-execution.qmd
            text: IV — Microstructure & Execution
          - href: chapters/05-risk.qmd
            text: V — Portfolio Construction & Risk
          - href: chapters/06-organization.qmd
            text: VI — Organizational Reverse Engineering
          - href: chapters/07-experiments.qmd
            text: VII — Computational Reconstruction
          - href: chapters/08-synthesis.qmd
            text: VIII — Synthesis
      - section: "Appendices"
        contents:
          - appendices/evidence-registry.qmd
          - appendices/signal-database.qmd
          - appendices/bibliography.qmd

format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    toc: true
    code-copy: true
    include-in-header: _includes/navbar-subnav.html
    include-after-body: _includes/disclaimer-footer.html

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

filters:
  - filters/claim-refs.lua

execute:
  freeze: auto
  echo: false
  warning: false
