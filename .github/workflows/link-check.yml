name: Live link check

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check GitHub Pages site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 2
            --accept 200,403
            --exclude-mail
            https://nvavrock.github.io/medallion/

      - name: Upload lychee results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: .lycheeoutput
