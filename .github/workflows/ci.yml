name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Python dependencies
        run: make deps

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Reproduce pipeline
        run: make reproduce

      - name: Quarto check (gates A–D)
        run: make quarto-check
